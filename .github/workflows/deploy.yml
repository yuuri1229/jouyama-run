# =========================================================
# GitHub Pages 自動デプロイ
# main ブランチに変更をコミット（push）するたびに、
# サイトを自動でビルドして公開します。
# 事前に リポジトリの Settings → Pages → Source を
# 「GitHub Actions」に設定しておいてください。
# =========================================================
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # microCMSのWebhookから叩かれ、記事の公開・更新時に自動で再ビルドする
  repository_dispatch:
    types: [microcms-update]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存パッケージをインストール
        run: npm install

      - name: ベースパスを判定
        id: basepath
        # public/CNAME があれば独自ドメイン（ルート直下で公開）なのでベースパス不要。
        # なければ「ユーザー名.github.io」判定 → それ以外は /リポジトリ名 を自動設定
        # (GitHub Actionsの `&&`/`||` 式は空文字列を偽値として扱うため、
        #  シェルのif文で明示的に判定する)
        run: |
          if [ -f public/CNAME ]; then
            echo "value=" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.repository.name }}" == *.github.io ]]; then
            echo "value=" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: サイトをビルド
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.value }}
          # microCMS のAPIキー（Settings → Secrets and variables → Actions に登録）
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          # サービスドメインは既定で niigata24h。変更する場合のみ Secrets/Variables で上書き
          MICROCMS_SERVICE_DOMAIN: ${{ vars.MICROCMS_SERVICE_DOMAIN }}

      - name: 成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pagesへデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
